name: Build Manifest
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          
      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run manifest builder
        run: python build_manifest.py

      - name: Push changes
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          if [ -f manifest.json ]; then
            git add manifest.json
            git commit -m "Automatisk opdatering af manifest" || exit 0
            git push
          else
            echo "manifest.json blev ikke fundet, fejler jobbet"
            exit 1
          fi
